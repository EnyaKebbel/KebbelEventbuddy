<!doctype html>
<html lang="de" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EventBuddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/main.css" />
</head>

<body class="app">
<base-component></base-component>

<div class="layout">
    <!-- Header -->
    <header class="topbar">
        <div class="topbar__brand">
            <div class="topbar__logo" aria-hidden="true">
                <img src="Images/Logo/EB_Logo.png" alt="App Logo">
            </div>
            <h1 class="topbar__title">EventBuddy</h1>
        </div>

        <div class="topbar__actions">
            <button id="btn-tags" type="button" class="btn btn--ghost">Tags</button>
        </div>
    </header>

    <!-- Inhalt mit Sidebar + Main -->
    <div class="workspace">
        <!-- Sidebar -->
        <aside class="sidebar" aria-label="Filterbereich">
            <section class="sidebar__section">
                <h2 class="sidebar__heading">Filter</h2>

                <div class="form-group">
                    <label for="filter-status">Status</label>
                    <select id="filter-status" name="filter-status">
                        <option value="alle">Alle</option>
                        <option value="geplant">Geplant</option>
                        <option value="abgeschlossen">Abgeschlossen</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="filter-participant">Teilnehmer</label>
                    <select id="filter-participant" name="filter-participant">
                        <option value="alle">Alle Teilnehmer</option>
                        <option value="max">Max Mustermann</option>
                        <option value="lea">Lea Beispiel</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="filter-tag">Tags</label>
                    <select id="filter-tag" name="filter-tag">
                        <option value="alle">Alle Tags</option>
                        <option value="workshop">Workshop</option>
                        <option value="verein">Verein</option>
                        <option value="konzert">Konzert</option>
                    </select>
                </div>
            </section>

            <section class="sidebar__section">
                <button id="btn-new-event" type="button" class="btn btn--primary btn--block">
                    + Neues Event
                </button>
            </section>
        </aside>

        <!-- Main Content -->
        <main class="main" aria-label="Eventbereich">

            <!-- SCREEN: LIST -->
            <section id="screen-list" class="panel panel--list">
                <header class="panel__header">
                    <h2>Event Liste</h2>
                </header>
                <event-list></event-list>
            </section>

            <!-- SCREEN: DETAIL -->
            <section id="screen-detail" class="panel panel--detail">
                <event-detail></event-detail>
            </section>

            <!-- SCREEN: FORM -->
            <section id="screen-form" class="panel panel--detail">
                <event-form></event-form>
            </section>

            <!-- SCREEN: TAGS -->
            <section id="screen-tags" class="panel panel--list">
                <header class="panel__header">
                    <h2>Tags verwalten</h2>
                </header>
                <tag-manager></tag-manager>
            </section>

        </main>
    </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
