<!doctype html>
<html lang="de" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EventBuddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/main.css" />
</head>

<body class="app">
<base-component></base-component>

<div class="layout">
    <!-- Header -->
    <header class="topbar">
        <div class="topbar__brand">
            <div class="topbar__logo" aria-hidden="true">
                <img src="./Images/Logo/EB_Logo.png" alt="App Logo">
            </div>
            <h1 class="topbar__title">EventBuddy</h1>
        </div>

        <div class="topbar__actions">
            <button id="btn-tags" type="button" class="btn btn--ghost">Tags</button>
        </div>
    </header>

    <!-- Inhalt mit Sidebar + Main -->
    <div class="workspace">
        <!-- Sidebar -->
        <aside class="sidebar" aria-label="Filterbereich">
            <filter-view></filter-view>

            <section class="sidebar__section">
                <button id="btn-new-event" type="button" class="btn btn--primary btn--block">
                    + Neues Event
                </button>
            </section>
        </aside>

        <!-- Main Content -->
        <main class="main" aria-label="Eventbereich">

            <!-- ZURÜCK BUTTON -->
            <div id="global-back-container" style="display:none; margin-bottom: 12px;">
                <button id="btn-back-global" class="btn btn--ghost">
                    ← Zurück
                </button>
            </div>

            <!-- SCREEN: LIST -->
            <section id="screen-list" class="panel panel--list">
                <header class="panel__header">
                    <h2>Event Liste</h2>
                </header>
                <event-list></event-list>
            </section>

            <!-- SCREEN: DETAIL -->
            <section id="screen-detail" class="panel panel--detail">
                <event-detail></event-detail>
            </section>

            <!-- SCREEN: FORM -->
            <section id="screen-form" class="panel panel--detail">
                <event-form></event-form>
            </section>

            <!-- SCREEN: TAGS -->
            <section id="screen-tags" class="panel panel--list">
                <tag-manager></tag-manager>
            </section>

        </main>
    </div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
